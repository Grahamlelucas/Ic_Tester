<!-- ic_tester_app/web_ui/templates/base.html -->
<!-- Last edited: 2026-04-09 -->
<!-- Purpose: Base HTML template with Bootstrap 5 -->

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-light: #252542;
            --accent-primary: #6366f1;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --accent-info: #3b82f6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .card-header {
            background-color: rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
        }
        
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }
        
        .btn-primary {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        
        .btn-success {
            background-color: var(--accent-success);
            border-color: var(--accent-success);
        }
        
        .btn-info {
            background-color: var(--accent-info);
            border-color: var(--accent-info);
        }
        
        .form-control, .form-select {
            background-color: var(--bg-light);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-light);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }
        
        .log-container {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background-color: var(--bg-dark);
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 4px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        
        .log-success { color: var(--accent-success); }
        .log-error { color: var(--accent-error); }
        .log-warning { color: var(--accent-warning); }
        .log-info { color: var(--accent-info); }
        .log-header { color: var(--accent-primary); font-weight: 600; }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-connected { background-color: var(--accent-success); }
        .status-disconnected { background-color: var(--accent-error); }
        .status-connecting { background-color: var(--accent-warning); animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .pin-input {
            width: 60px;
            text-align: center;
        }
        
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: var(--bg-card);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        .main-content {
            padding: 20px;
        }
        
        .navbar {
            background-color: var(--bg-card);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .navbar-brand {
            font-weight: 700;
            color: var(--accent-primary) !important;
        }
        
        .nav-link {
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
        }
        
        .stat-card {
            text-align: center;
            padding: 20px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--bg-light);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-cpu me-2"></i>{{ app_name }}
            </a>
            <span class="text-muted small me-3">{{ app_subtitle }}</span>
            <span class="badge bg-secondary">v{{ app_version }}</span>
            
            <div class="d-flex align-items-center ms-auto">
                <div id="connectionStatus" class="d-flex align-items-center me-3">
                    <span class="status-indicator status-disconnected me-2"></span>
                    <span class="text-muted small">Disconnected</span>
                </div>
            </div>
        </div>
    </nav>
    
    {% block content %}{% endblock %}
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <script>
        // Initialize SocketIO
        const socket = io();
        
        // Connection status tracking
        let isConnected = false;
        let isTesting = false;
        
        // Socket event handlers
        socket.on('connect', function() {
            console.log('Connected to server');
            socket.emit('request_status');
        });
        
        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            updateConnectionStatus(false);
        });
        
        socket.on('status', function(data) {
            updateConnectionStatus(data.connected, data.port, data.board_type);
            isTesting = data.is_testing;
        });
        
        socket.on('connected', function(data) {
            if (data.success) {
                updateConnectionStatus(true, data.port, data.board_type);
                showToast('Connected successfully', 'success');
            } else {
                showToast(data.error || 'Connection failed', 'error');
            }
        });
        
        socket.on('disconnected', function(data) {
            updateConnectionStatus(false);
            showToast('Disconnected', 'info');
        });
        
        socket.on('log', function(data) {
            addLogEntry(data.message, data.level);
        });
        
        socket.on('error', function(data) {
            showToast(data.message, 'error');
        });
        
        // Helper functions
        function updateConnectionStatus(connected, port, boardType) {
            isConnected = connected;
            const statusEl = document.getElementById('connectionStatus');
            if (connected) {
                statusEl.innerHTML = `
                    <span class="status-indicator status-connected me-2"></span>
                    <span class="text-success small">${boardType || 'Connected'} ${port ? '(' + port + ')' : ''}</span>
                `;
            } else {
                statusEl.innerHTML = `
                    <span class="status-indicator status-disconnected me-2"></span>
                    <span class="text-muted small">Disconnected</span>
                `;
            }
        }
        
        function addLogEntry(message, level = 'info') {
            const logContainer = document.getElementById('logContainer');
            if (!logContainer) return;
            
            const entry = document.createElement('div');
            entry.className = `log-entry log-${level}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function showToast(message, type = 'info') {
            // Create toast notification
            const toastContainer = document.getElementById('toastContainer') || createToastContainer();
            
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type === 'error' ? 'danger' : type === 'success' ? 'success' : 'info'}`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            
            toastContainer.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
            bsToast.show();
            
            toast.addEventListener('hidden.bs.toast', () => toast.remove());
        }
        
        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container position-fixed top-0 end-0 p-3';
            container.style.zIndex = '1050';
            document.body.appendChild(container);
            return container;
        }
        
        {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
